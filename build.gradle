plugins {
    id 'org.jetbrains.kotlin.jvm' version '1.9.23'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.jetbrains.kotlin:kotlin-test'
    implementation("org.apache.poi:poi-ooxml:5.2.3")
}

test {
    useJUnitPlatform()
}
kotlin {
    jvmToolchain(11)
}
